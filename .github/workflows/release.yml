name: Release Nova Client

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Nova Client v$VERSION"

      - name: Create release ZIP
        run: |
          zip -r "nova-client-${{ steps.version.outputs.version }}.zip" \
            main.js \
            preload.js \
            index.html \
            package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nova Client v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: nova-client-${{ steps.version.outputs.version }}.zip
